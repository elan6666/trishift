dataset: adamson
base:
  defaults: configs/defaults.yaml
  paths: configs/paths.yaml
defaults_overrides:
  k_topk: 10
  matching_mode: ot
  train_mode: joint
  n_eval_ensemble: 10
  eval_ctrl_pool_mode: all
  eval_genept_distance: l2
  eval_genept_compare_mode: aggregate_cond
  eval_genept_train_candidate_mode: all_train_pert
  seed: 24
  run:
    multi_split: false
    n_splits: 1
  performance:
    amp: false
    num_workers: 0
    pin_memory: false
    grad_accum_steps: 1
    chunk_size: 512
  train:
    stage1:
      epochs: 2
      batch_size: 64
      lr: 0.0005
      beta: 1.0
      deg_weight: 1
      sched_gamma: 1
      patience: 2
      min_delta: 0.001
    stage23:
      epochs: 2
      batch_size: 64
      lr: 0.001
      sched_gamma: 1
      patience: 2
      min_delta: 0.001
  loss:
    gamma: 0
    lambda_dir: 0.05
    lambda_dir_expr: 0.05
    lambda_dir_z: 0.05
    lambda_z: 1
    deg_weight: 1
    lambda_expr_mse: 0
    lambda_neg_expr: 0.1
    neg_expr_penalty: mae
  ablation:
    stage1_use_train_split: true
    topk_strategy: random
    sample_soft_ctrl: false
    per_condition_ot: true
    reuse_ot_cache: false
    reuse_z_mu_cache: false
    latent_loss_type: gears
  model:
    stage1:
      z_dim: 8
      hidden_dim: 64
      noise_rate: 0.1
      kl_weight: 0.0005
    stage2:
      shift_hidden:
      - 64
      - 128
      predict_shift: true
      predict_delta: false
      shift_repr_dim: 8
      shift_input_source: latent_mu
      cond_pool_mode: sum
      cond_l2_norm: false
      use_cross_attention: false
      use_transformer_block: false
    stage3:
      input_mode: full
      encoder_hidden:
      - 128
      - 64
      state_dim: 16
      decoder_hidden:
      - 128
      use_batch_norm: false
      use_layer_norm: false
      dropout: 0.0
      use_residual_head: true
paths_overrides:
  datasets:
    adamson: examples/adamson_mini/data/adamson_mini.h5ad
  embeddings:
    emb_b: examples/adamson_mini/data/genept_mini.pickle
